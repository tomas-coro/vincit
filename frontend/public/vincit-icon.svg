<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1a1530"/>
  <!-- V — thick rounded stroke, the two round endpoints read as crown dots -->
  <polyline
    points="148,108 256,378 364,108"
    fill="none"
    stroke="#c8973f"
    stroke-width="64"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Centre crown jewel above the V opening -->
  <circle cx="256" cy="62" r="26" fill="#c8973f"/>
</svg>
